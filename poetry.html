/* ═══ CURSOR ROUTER ═══ */
var _activeJump=null; /* {lang,vi,li,jump(charOff)} set by edit sections */

function navigate(frag){
  var parts=frag.split(".");
  if(parts.length<4)return;
  var lang=parts[0];
  if(lang!=="en"&&lang!=="he")return;
  var vi2=parseInt(parts[1])-1;
  var li2=parseInt(parts[2])-1;
  var wi2=parseInt(parts[3])-1;
  var ci2=parts.length>=5?parseInt(parts[4]):0;
  if(isNaN(vi2)||vi2<0||vi2>=verses.length)return;
  var v2=verses[vi2];
  var arr2=lang==="en"?v2.en:v2.he;
  if(li2<0||li2>=Math.max(v2.en.length,v2.he.length))return;
  var txt2=(arr2[li2])||"";
  var ws2=txt2.split(/\s+/);
  var charOff=0;
  for(var k=0;k<ws2.length&&k<wi2;k++)charOff+=ws2[k].length+1;
  charOff=Math.min(charOff+ci2,txt2.length);
  var ek2=lang+"-"+v2.id+"-"+li2;

  /* MODE: matrix -> lines + edit */
  if(showMatrix){showMatrix=false;editing=ek2;editVal=txt2;editWordIdx=wi2;render();return;}

  /* MODE: editing same line -> move cursor */
  if(editing===ek2&&_activeJump&&_activeJump.lang===lang){_activeJump.jump(charOff);return;}

  /* MODE: editing other line or view -> enter edit */
  editing=ek2;editVal=txt2;editWordIdx=wi2;render();
}





/* ═══ REF NAV — single delegated handler ═══ */
document.addEventListener("click",function(e){
  var el=e.target;
  while(el&&el!==document.body){
    var ref=el.getAttribute("data-ref");
    if(ref){
      e.preventDefault();e.stopPropagation();
      handleRef(ref);
      return;
    }
    el=el.parentElement;
  }
});

function handleRef(ref){
  if(!ref||ref[0]!=="#")return;
  var parts=ref.slice(1).split(".");
  if(parts.length<5)return;
  var lang=parts[0];
  if(lang!=="en"&&lang!=="he")return;
  var vi2=parseInt(parts[1])-1;
  var li2=parseInt(parts[2])-1;
  var wi2=parseInt(parts[3])-1;
  var ci2=parseInt(parts[4]);
  if(isNaN(vi2)||vi2<0||vi2>=verses.length)return;
  var v2=verses[vi2];
  var arr2=lang==="en"?v2.en:v2.he;
  if(li2<0||li2>=arr2.length)return;
  var txt2=arr2[li2]||"";

  /* compute char offset */
  var ws2=txt2.split(/\s+/);
  var charOff=0;
  for(var k=0;k<ws2.length&&k<wi2;k++)charOff+=ws2[k].length+1;
  charOff+=ci2;
  charOff=Math.min(charOff,txt2.length);

  /* if already editing this line, jump cursor */
  var ek2=lang+"-"+v2.id+"-"+li2;
  if(editing===ek2&&_activeJump&&_activeJump.lang===lang){
    _activeJump.jump(charOff);
    return;
  }

  /* enter edit */
  editing=ek2;
  editVal=txt2;
  editWordIdx=wi2;
  render();
}

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

async function callApi(sys,usr,tok){
  for(var a=0;a<4;a++){
    var r;try{r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:tok||8192,system:sys,messages:[{role:"user",content:usr}]})});}catch(e){if(a<3){await sleep(3000*(a+1));continue;}throw new Error("Net:"+e.message);}
    var d;try{d=await r.json();}catch(e){throw new Error("!JSON("+r.status+")");}
    if(d.error){var et=d.error.type||"";if(et==="exceeded_limit"||et==="rate_limit_error"||et==="overloaded"||r.status===429){if(a<3){await sleep(5000*(a+1));continue;}}throw new Error("API:"+(d.error.message||JSON.stringify(d.error)));}
    if(!d.content||!d.content.length)throw new Error("Empty");
    var txt=d.content.map(function(b){return b.text||"";}).join("\n");
    var trunc=d.stop_reason==="max_tokens";
    var cl=txt.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
    var i1=cl.indexOf("{"),i2=cl.indexOf("["),st=i1>=0&&(i2<0||i1<i2)?i1:i2>=0?i2:-1;
    if(st>0)cl=cl.slice(st);
    var lb=cl.lastIndexOf("}"),lk=cl.lastIndexOf("]"),end=Math.max(lb,lk);
    if(end>0&&end<cl.length-1)cl=cl.slice(0,end+1);
    if(trunc&&cl[0]==="["){var lc=cl.lastIndexOf("}");if(lc>0){try{var arr=JSON.parse(cl.slice(0,lc+1)+"]");if(arr.length>0)return arr;}catch(e2){}}}
    try{return JSON.parse(cl);}catch(e){throw new Error("JSON"+(trunc?" TRUNC":"")+":"+e.message.slice(0,60));}
  }
}

function pickPath(vid,idx){
  var p=(pathData[vid]||[])[idx];if(!p||!p.lines)return;
  pushUndo();
  var v=verses.find(function(x){return x.id===vid;});
  var lines=[];p.lines.forEach(function(l){l.split(/\n| \/ | \\ /).forEach(function(seg){if(seg.trim())lines.push(seg.trim());});});
  v.en=lines.map(function(l){return l?l.charAt(0).toUpperCase()+l.slice(1):l;});
  /* store path analytics — IPA data from analysis, not re-derived from text */
  v._path={
    path: p.path,
    name: p.name||p.path_name||"",
    he_ipa: p.he_ipa||"",
    en_ipa: p.en_ipa||"",
    anchor: p.anchor||"",
    sonic_fidelity: p.sonic_fidelity||"",
    rhyme_pair: p.rhyme_pair||null,
    skeleton: p.skeleton||[]
  };
  /* build per-line IPA map from skeleton: map each EN line to its anchor IPA */
  v._lineIpa={};
  if(p.rhyme_pair&&p.rhyme_pair.words&&p.rhyme_pair.words.length===2){
    /* assign rhyme_pair IPA to lines whose last word matches anchor */
    var rp=p.rhyme_pair;
    v.en.forEach(function(l,li){
      var last=l.replace(/[,.\-;:!?\s]+$/,"").split(/\s+/).pop()||"";
      if(rp.words.indexOf(last.toLowerCase())>=0){
        v._lineIpa[li]=rp.ipa||enIpa(last);
      }
    });
  }
  /* fall back: use skeleton chosen words to map line endings */
  if(p.skeleton){
    p.skeleton.forEach(function(sk){
      if(!sk.chosen)return;
      var skIpa=enIpa(sk.chosen);
      v.en.forEach(function(l,li){
        if(v._lineIpa[li])return;
        var last=l.replace(/[,.\-;:!?\s]+$/,"").split(/\s+/).pop()||"";
        if(last.toLowerCase()===sk.chosen.toLowerCase()&&skIpa)v._lineIpa[li]=skIpa;
      });
    });
  }
  render();
}

/* syllables - using UniKey syllable parsing */
function sH(l) {
  /* Hebrew syllable count from UniKey */
  var syls = parseHebrewSyllables(l.replace(/[,.\-;:!?\s]+$/,""));
  return syls.length;
}
function sE(w) {
  /* English syllable count from UniKey */
  var syls = parseEnglishSyllables(w);
  return Math.max(1, syls.length);
}
function sL(l) {
  return l.replace(/[^a-zA-Z\s'-]/g,"").split(/\s+/).filter(Boolean).reduce(function(a,w){return a+sE(w);},0);
}

/* colored scheme: A:ret · B:har · ... */
function schemeSpan(arr){
  var frag=document.createDocumentFragment();
  arr.forEach(function(r,i){
    if(i>0){var dot=document.createElement("span");dot.textContent=" ";dot.style.color="#333";frag.appendChild(dot);}
    /* letter */
    var lsp=document.createElement("span");
    lsp.textContent=r.ch;
    lsp.style.color=hl(r.hue,75,70);
    lsp.style.fontFamily="'JetBrains Mono',monospace";
    lsp.style.fontSize="11px";
    lsp.style.fontWeight="700";
    frag.appendChild(lsp);
    /* colon+ipa */
    var isp=document.createElement("span");
    isp.textContent=":"+r.ipa;
    isp.style.color=hl(r.hue,40,45);
    isp.style.fontFamily="'JetBrains Mono',monospace";
    isp.style.fontSize="8px";
    frag.appendChild(isp);
  });
  return frag;
}

/* ═══ DOM HELPERS ═══ */
function h(tag,props,kids){
  var el=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==="style"&&typeof props[k]==="object"){Object.assign(el.style,props[k]);}
    else if(k.slice(0,2)==="on"){el.addEventListener(k.slice(2).toLowerCase(),props[k]);}
    else if(k==="className"){el.className=props[k];}
    else{el.setAttribute(k,props[k]);}
  });
  if(kids){(Array.isArray(kids)?kids:[kids]).forEach(function(c){
    if(c==null)return;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });}
  return el;
}

function colorWord(word, lang, isEnd, href){
  /* Use UniKeySyllable for hue - auto-detects script from Unicode */
  var hue = wordHue(word);
  var el = document.createElement("span");
  if(href){el.setAttribute("data-ref",href);el.style.cursor="pointer";}
  el.textContent = word;
  el.style.color = hl(hue, isEnd ? 80 : 45, isEnd ? 72 : 55);
  if(isEnd){
    el.style.fontWeight = "700";
    el.style.textShadow = "0 0 8px " + hl(hue, 60, 25);
    el.style.borderBottom = "2px solid " + hl(hue, 50, 30);
  }
  return el;
}

function colorLine(text, lang, vi, li){
  var frag = document.createDocumentFragment();
  var ws = text.split(/\s+/);
  ws.forEach(function(w, i){
    var href = (vi != null && li != null) ? "#" + lang + "." + (vi+1) + "." + (li+1) + "." + (i+1) + ".0" : null;
    frag.appendChild(colorWord(w, lang, i === ws.length - 1, href));
    if(i < ws.length - 1) frag.appendChild(document.createTextNode(" "));
  });
  return frag;
}

function ipaChip(ipa){
  var hue=ipaHue(ipa);
  var sp=document.createElement("span");
  sp.className="ipa-chip";
  sp.textContent=ipa;
  sp.style.color=hl(hue,70,75);
  sp.style.background=hl(hue,30,12);
  sp.style.border="1px solid "+hl(hue,40,20);
  return sp;
}

function sylSpan(count,delta){
  var sp=document.createElement("span");
  sp.className="syl";
  var dc="#887755",dd="";
  if(delta===0){dc="#4a8a4a";dd="=";}else if(delta>0){dc="#c4a882";dd="+"+delta;}else if(delta<0){dc="#cc7744";dd=""+delta;}
  sp.style.color=dc;
  sp.textContent=count+"\u03C3"+dd;
  return sp;
}

function exportSuno(lang){
  var out="";
  verses.forEach(function(v){
    var lines=lang==="he"?v.he:v.en;
    var endings=lines.map(function(l){return lineEndIpa(l,lang);});
    var scheme=rhymeScheme(endings);
    var schStr=scheme.map(function(r){return r.ch;}).join("");
    var syls=lines.map(function(l){return lang==="he"?sH(l):sL(l);});
    var avgSyl=Math.round(syls.reduce(function(a,b){return a+b;},0)/syls.length);
    var parts=[v.tag];
    var bpm=v.bpmLo===v.bpmHi?"BPM:"+v.bpmLo:"BPM:"+v.bpmLo+"-"+v.bpmHi;
    parts.push(bpm);
    parts.push("Rhyme:"+schStr);
    parts.push("Syl:"+avgSyl);
    parts.push("Lines:"+lines.length);
    out+="["+parts.join(", ")+"]\n";
    out+=lines.join("\n")+"\n\n";
  });
  return out.trim();
}

  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt);

    ta.value=txt;ta.style.cssText="position:fixed;left:-9999px";
    document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy");}catch(e){}
    document.body.removeChild(ta);
  }
  var old=btn.textContent;

}

function loadMd(text){
  pushUndo();
  var sections=text.split(/^---$/m).map(function(s){return s.trim();});
  var enBlock="",heBlock="";
  sections.forEach(function(sec){
    if(/^## English/i.test(sec)){enBlock=sec.replace(/^## English\s*/i,"").trim();}
    else if(/^## \u05E2\u05D1\u05E8\u05D9\u05EA/i.test(sec)||/^##.*Hebrew/i.test(sec)){heBlock=sec.replace(/^##[^\n]*\n/,"").trim();}
  });
  if(!enBlock&&!heBlock){
    var all=text.replace(/^#[^\n]*\n/gm,"").replace(/^---$/gm,"").replace(/^\*[^\n]*\n/gm,"").trim();
    var paras=all.split(/\n\n+/);
    var enP=[],heP=[];
    paras.forEach(function(p){
      if(/[\u05D0-\u05EA]/.test(p))heP.push(p);
      else if(p.trim())enP.push(p);
    });
    enBlock=enP.join("\n\n");
    heBlock=heP.join("\n\n");
  }
  /* helper: parse [Tag, BPM:lo-hi, ...] */
  function parseTag(line,vi){
    var m=line.trim().match(/^\[(.+)\]$/);
    if(!m)return false;
    var parts=m[1].split(/,\s*/);
    parts.forEach(function(p){
      var kv=p.split(":");
      if(kv.length===1&&SUNO.indexOf(kv[0].trim())>=0){verses[vi].tag=kv[0].trim();}
      else if(kv[0].trim().toUpperCase()==="BPM"&&kv[1]){
        var bv=kv[1].trim().split("-");
        var lo=parseInt(bv[0]),hi=bv.length>1?parseInt(bv[1]):lo;
        if(!isNaN(lo))verses[vi].bpmLo=Math.max(40,Math.min(240,lo));
        if(!isNaN(hi))verses[vi].bpmHi=Math.max(verses[vi].bpmLo,Math.min(240,hi));
      }
    });
    return true;
  }
  if(enBlock){
    var enVerses=enBlock.split(/\n\n+/);
    enVerses.forEach(function(ev,i){
      if(i>=verses.length)return;
      var lines=ev.split("\n").filter(function(l){return l.trim();});
      if(lines.length>0&&/^\[.+\]$/.test(lines[0].trim())){
        parseTag(lines[0],i);
        lines=lines.slice(1);
      }
      verses[i].en=lines.map(function(l){return l.charAt(0).toUpperCase()+l.slice(1);});
    });
  }
  if(heBlock){
    var heVerses=heBlock.split(/\n\n+/);
    heVerses.forEach(function(hv,i){
      if(i>=verses.length)return;
      var lines=hv.split("\n").filter(function(l){return l.trim();});
      if(lines.length>0&&/^\[.+\]$/.test(lines[0].trim())){
        parseTag(lines[0],i);
        lines=lines.slice(1);
      }
      verses[i].he=lines;
    });
  }
  render();
}

function colorLineWithCursor(text, lang, pos, vi, li){
  var frag = document.createDocumentFragment();
  var full = text + "";
  var segs = full.split(/(\s+)/);
  var offset = 0, wordIdx = 0;

  segs.forEach(function(seg){
    if(/^\s+$/.test(seg)){
      frag.appendChild(document.createTextNode(seg));
      offset += seg.length;
      return;
    }
    var segStart = offset;
    var segEnd = offset + seg.length;
    var wi = wordIdx; wordIdx++;
    /* Use UniKeySyllable wordHue - auto-detects script from Unicode */
    var hue = wordHue(seg);
    var hasCursor = pos >= segStart && pos < segEnd;

    if(hasCursor){
      var ci = pos - segStart;
      var before = seg.slice(0, ci);
      var after = seg.slice(ci);
      if(before){
        var sp = document.createElement("span");
        sp.textContent = before;
        sp.style.color = hl(hue, 50, 60);
        frag.appendChild(sp);
      }
      var cur = document.createElement("span");
      cur.className = "cursor";
      frag.appendChild(cur);
      if(after){
        var sp2 = document.createElement("span");
        sp2.textContent = after;
        sp2.style.color = hl(hue, 50, 60);
        frag.appendChild(sp2);
      }
    }else{
      var wp = document.createElement("span");
      wp.setAttribute("data-ref", "#" + lang + "." + (vi != null ? vi + 1 : "?") + "." + ((li != null ? li : 0) + 1) + "." + (wi + 1) + ".0");
      wp.textContent = seg;
      wp.style.color = hl(hue, 50, 60);
      wp.style.cursor = "pointer";
      frag.appendChild(wp);
    }
    offset += seg.length;
  });
  if(pos >= full.length){
    var cur2 = document.createElement("span");
    cur2.className = "cursor";
    frag.appendChild(cur2);
  }
  return frag;
}

/* auto-capitalize first letter of EN lines */
function autoCap(val,lang){
  if(lang!=="en"||!val)return val;
  return val.charAt(0).toUpperCase()+val.slice(1);
}

/* navigate between lines while editing */
/* lang="en"|"he", vid=verse id, li=line index, inp=hidden input, savFlag object */
function editNav(e,lang,vid,li,inp,savFlag){
  var v=verses.find(function(x){return x.id===vid;});
  var arr=lang==="en"?v.en:v.he;
  var vi=verses.indexOf(v);
  var mx=Math.max(v.en.length,v.he.length);

  /* syllable boundaries: find word start positions */
  function wordStarts(txt){
    var ws=[0];
    for(var i=0;i<txt.length;i++){
      if(txt[i]===" "&&i+1<txt.length&&txt[i+1]!==" ")ws.push(i+1);
    }
    ws.push(txt.length);
    return ws;
  }

  /* find word index at cursor position */
  function wordIdxAt(txt,pos){
    var ws=txt.split(/\s+/);
    var off=0,idx=0;
    for(var i=0;i<ws.length;i++){
      var end=off+ws[i].length;
      if(pos<=end){idx=i;break;}
      off=end+1;idx=i;
    }
    return idx;
  }

  /* find char offset of word by index */
  function wordOffset(txt,idx){
    var ws=txt.split(/\s+/);
    var off=0;
    for(var i=0;i<ws.length&&i<idx;i++){off+=ws[i].length+1;}
    return Math.min(off,txt.length);
  }

  if(e.shiftKey&&(e.key==="ArrowLeft"||e.key==="ArrowRight")){
    e.preventDefault();
    var txt=inp.value;
    var pos=inp.selectionStart;
    var starts=wordStarts(txt);
    if(e.key==="ArrowLeft"){
      /* jump to previous word start */
      var prev=0;
      for(var i=starts.length-1;i>=0;i--){if(starts[i]<pos){prev=starts[i];break;}}
      inp.setSelectionRange(prev,prev);
    }else{
      /* jump to next word start */
      var next=txt.length;
      for(var j=0;j<starts.length;j++){if(starts[j]>pos){next=starts[j];break;}}
      inp.setSelectionRange(next,next);
    }
    /* trigger redraw via keyup */
    return;
  }

  if(e.shiftKey&&(e.key==="ArrowUp"||e.key==="ArrowDown")){
    e.preventDefault();
    pushUndo();
    arr[li]=inp.value;
    savFlag.s=true;
    var curWi=wordIdxAt(inp.value,inp.selectionStart);
    var dir=e.key==="ArrowUp"?-1:1;
    var nextLi=li+dir;
    var nextVi=vi;
    if(nextLi<0){
      if(vi>0){nextVi=vi-1;nextLi=Math.max(verses[nextVi].en.length,verses[nextVi].he.length)-1;}
      else return;
    }else if(nextLi>=mx){
      if(vi<verses.length-1){nextVi=vi+1;nextLi=0;}
      else return;
    }
    var nv=verses[nextVi];
    var nArr=lang==="en"?nv.en:nv.he;
    var nTxt=nArr[nextLi]||"";
    editing=lang+"-"+nv.id+"-"+nextLi;
    editVal=nTxt;
    /* store word index to restore cursor position after render */
    editWordIdx=curWi;
    render();
    return;
  }

  if(e.key==="Enter"){
    e.preventDefault();
    pushUndo();
    arr[li]=autoCap(inp.value,lang);
    v.en.splice(li+1,0,"");
    v.he.splice(li+1,0,"");
    editing=lang+"-"+vid+"-"+(li+1);
    editVal="";
    savFlag.s=true;
    render();
    return;
  }
  if(e.key==="Tab"){
    e.preventDefault();
    pushUndo();
    arr[li]=autoCap(inp.value,lang);
    savFlag.s=true;
    var nextLi2=li+(e.shiftKey?-1:1);
    var nextVi2=vi;
    if(nextLi2<0){
      if(vi>0){nextVi2=vi-1;nextLi2=Math.max(verses[nextVi2].en.length,verses[nextVi2].he.length)-1;}
      else{nextLi2=0;}
    }else if(nextLi2>=mx){
      if(vi<verses.length-1){nextVi2=vi+1;nextLi2=0;}
      else{nextLi2=mx-1;}
    }
    var nv2=verses[nextVi2];
    var nArr2=lang==="en"?nv2.en:nv2.he;
    editing=lang+"-"+nv2.id+"-"+nextLi2;
    editVal=nArr2[nextLi2]||"";
    render();
    return;
  }
  if(e.key==="Escape"){
    savFlag.s=true;editing=null;render();
    return;
  }
}

/* keep active edit visible on mobile zoom */
function keepInView(el){
  if(!el)return;
  requestAnimationFrame(function(){
    var r=el.getBoundingClientRect();
    var vh=window.innerHeight||document.documentElement.clientHeight;
    var vw=window.innerWidth||document.documentElement.clientWidth;
    if(r.top<0||r.bottom>vh||r.left<0||r.right>vw){
      el.scrollIntoView({block:"center",inline:"nearest",behavior:"instant"});
    }
  });
}

function moveL(vi,li,dir){
  pushUndo();
  var v=verses[vi],mx=Math.max(v.en.length,v.he.length),j=li+dir;
  if(j>=0&&j<mx){var te=v.en[li];v.en[li]=v.en[j]||"";v.en[j]=te;var th=v.he[li];v.he[li]=v.he[j]||"";v.he[j]=th;return;}
  if(dir<0&&li===0&&vi>0){var dst=verses[vi-1];dst.en.push(v.en.splice(0,1)[0]||"");dst.he.push(v.he.splice(0,1)[0]||"");return;}
  if(dir>0&&li===mx-1&&vi<verses.length-1){var dst2=verses[vi+1];dst2.en.unshift(v.en.splice(li,1)[0]||"");dst2.he.unshift(v.he.splice(li,1)[0]||"");return;}
}

  Object.keys(groups).sort().forEach(function(key){
    var rows=groups[key];var hue=ipaHue(key);
    var gd=h("div",{className:"mat-group",style:{border:"1px solid "+hl(hue,30,20)}});
    var ghdr=h("div",{className:"mat-hdr",style:{background:hl(hue,20,8)}});
    ghdr.appendChild(ipaChip(key));
    ghdr.appendChild(h("span",{style:{color:hl(hue,50,60),fontSize:"11px",fontFamily:"mono"}},[rows.length+" lines"]));
    gd.appendChild(ghdr);
    rows.forEach(function(r){
      var row=h("div",{className:"mat-row"});
      row.appendChild(h("span",{style:{color:"#444",fontSize:"9px",width:"20px",fontFamily:"mono"}},[r.vl]));
      var enD=h("div",{style:{flex:"1"}});enD.appendChild(colorLine(r.en,"en"));row.appendChild(enD);
      row.appendChild(ipaChip(r.eIpa));
      row.appendChild(h("span",{style:{color:"#444",fontSize:"9px"}},["\u2194"]));
      row.appendChild(ipaChip(r.hIpa));
      var heD=h("div",{style:{flex:"1",direction:"rtl",textAlign:"right",fontFamily:"'Noto Sans Hebrew',serif"}});heD.appendChild(colorLine(r.he,"he"));row.appendChild(heD);
      gd.appendChild(row);
    });
    app.appendChild(gd);
  });
}

render();
</script>
